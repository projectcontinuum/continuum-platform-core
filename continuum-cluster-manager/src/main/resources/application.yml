spring.application.name: continuum-cluster-manager
server:
  port: 8080
  error:
    include-message: always
    include-stacktrace: on_param
spring:
  datasource:
    url: ${CONTINUUM_DB_URL:jdbc:postgresql://localhost:35432/continuum}
    username: ${CONTINUUM_DB_USERNAME:continuum_owner}
    password: ${CONTINUUM_DB_PASSWORD:continuum-test-password}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always

continuum.core:
  cluster-manager:
    kubernetes:
      master-url: ${KUBERNETES_MASTER_URL:http://kubernetes.default.svc}
      kubeconfig: ${KUBECONFIG:~/.kube/config}
    workbench:
      default-image: ${WORKBENCH_DEFAULT_IMAGE:theiaide/theia:latest}
      default-namespace: ${WORKBENCH_DEFAULT_NAMESPACE:default}

springdoc:
  packages-to-scan: org.projectcontinuum.core.cluster.manager.controller
