spring.application.name: continuum-cluster-manager-test
spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always

continuum.core:
  cluster-manager:
    kubernetes:
      master-url: ""
    workbench:
      default-image: theiaide/theia:latest
      default-namespace: default
