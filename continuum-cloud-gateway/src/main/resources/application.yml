spring.application.name: continuum-cloud-gateway
server:
  port: 8080
  error:
    include-message: always
    include-stacktrace: on_param
spring:
  datasource:
    url: ${CONTINUUM_DB_URL:jdbc:postgresql://localhost:35432/continuum}
    username: ${CONTINUUM_DB_USERNAME:continuum_owner}
    password: ${CONTINUUM_DB_PASSWORD:continuum-test-password}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always

# Spring Cloud Gateway Server MVC configuration
spring.cloud.gateway.mvc:
  enabled: true
  routes:
    - id: api-server
      uri: ${CONTINUUM_API_SERVER_URL:http://localhost:8081}
      predicates:
        - Path=/api-server/**
      filters:
        - StripPrefix=1
    - id: cluster-manager
      uri: ${CONTINUUM_CLUSTER_MANAGER_URL:http://localhost:8082}
      predicates:
        - Path=/cluster-manager/**
      filters:
        - StripPrefix=1

logging:
  level:
    org.projectcontinuum.core.cloud.gateway.service.WorkbenchProxyService: DEBUG
    org.projectcontinuum.core.cloud.gateway.service.WorkbenchWebSocketProxyHandler: DEBUG
