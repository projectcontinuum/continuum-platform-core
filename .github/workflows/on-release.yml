name: Release

on:
  release:
    types: [published]

jobs:
  release:
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Libraries → Maven Central
          - module: continuum-avro-schemas
            publish_to_maven: true
            publish_to_docker_hub: false
          - module: continuum-commons
            publish_to_maven: true
            publish_to_docker_hub: false
          - module: continuum-worker-springboot-starter
            publish_to_maven: true
            publish_to_docker_hub: false
          - module: continuum-gradle-plugin
            publish_to_maven: true
            publish_to_docker_hub: false
          # Services → Docker Hub
          - module: continuum-api-server
            publish_to_maven: false
            publish_to_docker_hub: true
          - module: continuum-orchestration-service
            publish_to_maven: false
            publish_to_docker_hub: true
          - module: continuum-message-bridge
            publish_to_maven: false
            publish_to_docker_hub: true
          - module: continuum-cluster-manager
            publish_to_maven: false
            publish_to_docker_hub: true
          - module: landing-page
            publish_to_maven: false
            publish_to_docker_hub: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build and test
        run: ./gradlew :${{ matrix.module }}:build --no-daemon

      - name: Publish to local staging
        if: matrix.publish_to_maven
        run: ./gradlew :${{ matrix.module }}:publish --no-daemon
        env:
          MAVEN_REPO_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_REPO_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}

      - name: Deploy to Maven Central via JReleaser
        if: matrix.publish_to_maven
        run: ./gradlew :${{ matrix.module }}:jreleaserDeploy --no-daemon
        env:
          JRELEASER_MAVENCENTRAL_SONATYPE_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          JRELEASER_MAVENCENTRAL_SONATYPE_TOKEN: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.GPG_SECRET_KEY }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.GPG_PUBLIC_KEY }}

      - name: Push container image to Docker Hub
        if: matrix.publish_to_docker_hub
        run: ./gradlew :${{ matrix.module }}:jib --no-daemon
        env:
          DOCKER_REPO_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
          DOCKER_REPO_PASSWORD: ${{ secrets.DOCKER_HUB_PASSWORD }}
